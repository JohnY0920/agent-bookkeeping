services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: architect_ledger
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d  # auto-runs on first start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d architect_ledger"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_dev_data:
