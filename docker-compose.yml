services:
  fastapi:
    build: ./processing-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${CLOUD_SQL_IP}:5432/architect_ledger
      - REDIS_URL=redis://redis:6379
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GCS_BUCKET=architect-ledger-docs
      - GCS_PROJECT_ID=${GCS_PROJECT_ID}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=noreply@architectledger.com
      - XERO_CLIENT_ID=${XERO_CLIENT_ID}
      - XERO_CLIENT_SECRET=${XERO_CLIENT_SECRET}
    depends_on:
      - redis
    restart: unless-stopped

  celery-worker:
    build: ./processing-service
    command: celery -A workers.celery_tasks worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@${CLOUD_SQL_IP}:5432/architect_ledger
      - REDIS_URL=redis://redis:6379
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - GCS_BUCKET=architect-ledger-docs
      - GCS_PROJECT_ID=${GCS_PROJECT_ID}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - EMAIL_FROM=noreply@architectledger.com
      - XERO_CLIENT_ID=${XERO_CLIENT_ID}
      - XERO_CLIENT_SECRET=${XERO_CLIENT_SECRET}
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=${CLOUD_SQL_IP}
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${DB_USER}
      - DB_POSTGRESDB_PASSWORD=${DB_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - WEBHOOK_URL=https://n8n.architectledger.com/
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  redis_data:
  n8n_data:
